services:
  - type: web
    name: emotion-sense-ai-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free # Can be updated to starter or higher depending on resources
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false # User will input their Supabase connection string
      - key: JWT_SECRET_KEY
        generateValue: true # Render will automatically generate a secure random secret key
      - key: JWT_ALGORITHM
        value: HS256
      - key: BACKEND_CORS_ORIGINS
        value: '["*"]'
