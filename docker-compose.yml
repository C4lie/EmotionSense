version: "3.9"

services:
  # ─── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotionsense_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/emotionsense
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - APP_ENV=development
      - APP_DEBUG=true
      - BACKEND_CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - deepface_weights:/workspace/.deepface
    networks:
      - emotionsense_net

  # ─── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: emotionsense_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emotionsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emotionsense_net

# ─── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  deepface_weights:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  emotionsense_net:
    driver: bridge
