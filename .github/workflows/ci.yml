name: EmotionSense AI CI/CD

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Frontend Build & Lint Verification ──────────────────────────────────────
  frontend:
    name: Frontend Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: emotion-sense-ai/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: emotion-sense-ai/frontend

      - name: Run Eslint Check
        run: npm run lint
        working-directory: emotion-sense-ai/frontend
        continue-on-error: true # Let lint warning not fail build, but run compilation

      - name: Verify Bundle Compilation
        run: npm run build
        working-directory: emotion-sense-ai/frontend

  # ─── Backend Test & Quality Verification ────────────────────────────────────
  backend:
    name: Backend Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: emotion-sense-ai/backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        working-directory: emotion-sense-ai/backend

      - name: Run Unit & Integration Tests
        run: |
          pytest
        working-directory: emotion-sense-ai/backend
        env:
          APP_ENV: testing
          JWT_SECRET_KEY: test-secret-key-for-ci-workflow
          DATABASE_URL: sqlite+aiosqlite:///./test.db
